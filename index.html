<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Done Delivery | مع تم لا تاكل هم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --main-green: #28a745; 
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .logo-wrapper {
            margin-bottom: 10px;
        }

        .profile-img {
            width: 180px; /* حجم مثالي للوغو الشفاف */
            height: auto;
            /* تأثير توهج أخضر خفيف خلف اللوغو الشفاف */
            filter: drop-shadow(0 0 15px rgba(40, 167, 69, 0.4));
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 { 
            font-size: 28px; 
            margin: 10px 0; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        
        .tagline { 
            font-size: 19px; 
            color: var(--main-green); 
            margin-bottom: 35px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .links-container { width: 100%; max-width: 400px; }

        .link-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .link-item:hover {
            border-color: var(--main-green);
            background: rgba(40, 167, 69, 0.12);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .link-item:active {
            transform: scale(0.97);
        }

        .link-item i { 
            font-size: 24px; 
            margin-left: 15px; 
            color: var(--main-green); 
            width: 30px;
            text-align: center;
        }

        .link-item span { font-size: 17px; font-weight: 500; }

        .footer { 
            margin-top: auto; 
            padding-top: 40px; 
            font-size: 12px; 
            opacity: 0.3;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="20260402_011334.png" alt="Done Delivery" class="profile-img">
    </div>

    <h1>Done Delivery</h1>
    <div class="tagline">مع تَـــــمّ ، لا تاكل هَـــــمّ ✅</div>

    <div class="links-container">
        <a href="https://www.facebook.com/share/1KigG4MfwV/" class="link-item" target="_blank">
            <i class="fab fa-facebook"></i>
            <span>تابعنا على فيسبوك</span>
        </a>

        <a href="https://www.instagram.com/done._.delivery?igsh=czNsNXI5dTJ2MHB4" class="link-item" target="_blank">
            <i class="fab fa-instagram"></i>
            <span>تابعنا على انستغرام</span>
        </a>

        <a href="https://whatsapp.com/channel/0029VbCioOJFCCoWIqIMAb3l" class="link-item" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span>قناة الواتساب الرسمية</span>
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Done Delivery - All Rights Reserved
    </div>

</body>
</html>
